name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # NOTE: Update this to a runner that supports macOS 26 when available.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Discovery.xcodeproj \
            -scheme Discovery \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Discovery.xcodeproj \
            -scheme Discovery \
            -destination 'platform=macOS' \
            -only-testing:DiscoveryTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Discovery.xcodeproj \
            -scheme Discovery \
            -destination 'platform=macOS' \
            -only-testing:DiscoveryUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
